
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
    --gold:#BA7517;--gold-light:#FAEEDA;
    --red:#E24B4A;--red-light:#FCEBEB;
    --text:var(--color-text-primary);--muted:var(--color-text-secondary);
    --bg:var(--color-background-primary);--bg2:var(--color-background-secondary);
    --border:#B8C5C0;--border-strong:#8FA89F;
  }
  body{font-family:'DM Sans',sans-serif;color:var(--text);background:transparent;min-height:100vh}
  h1,h2,h3{font-family:'Playfair Display',serif}
  .app{padding:1rem 0}

  /* SETUP SCREEN */
  .setup{max-width:560px;margin:0 auto}
  .setup-title{font-size:26px;font-weight:700;margin-bottom:6px;color:var(--text)}
  .setup-sub{font-size:14px;color:var(--muted);margin-bottom:24px}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--border-radius-lg);padding:1.25rem}
  .card+.card{margin-top:12px}
  .card-label{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
  .player-count-row{display:flex;gap:8px}
  .cnt-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--border-radius-md);background:var(--bg2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:var(--muted);transition:all .15s}
  .cnt-btn.active{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:500}
  .player-names{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .pname-row{display:flex;align-items:center;gap:10px}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
  .av0{background:#EEEDFE;color:#3C3489} .av1{background:#E1F5EE;color:#085041} .av2{background:#FAEEDA;color:#633806} .av3{background:#FAECE7;color:#712B13}
  input[type=text],input[type=number]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--border-radius-md);font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg2);color:var(--text);outline:none}
  input[type=text]:focus,input[type=number]:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(29,158,117,0.15)}
  .payment-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .pay-field label{font-size:12px;color:var(--muted);margin-bottom:4px;display:block}
  .btn-primary{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:var(--border-radius-md);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s;margin-top:16px}
  .btn-primary:hover{opacity:.88}
  .btn-secondary{padding:8px 16px;background:var(--bg2);color:var(--muted);border:1px solid var(--border);border-radius:var(--border-radius-md);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
  .btn-secondary:hover{border-color:var(--green);color:var(--green-dark)}

  /* GAME SCREEN */
  .game{max-width:700px;margin:0 auto}
  .game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
  .game-title{font-size:22px;font-weight:700}
  .game-actions{display:flex;gap:8px}
  .target-badge{font-size:12px;padding:4px 12px;background:var(--green-light);color:var(--green-dark);border-radius:999px;font-weight:500}

  /* SCORE TABLE */
  .score-table{background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:16px}
  .score-table table{width:100%;border-collapse:collapse;table-layout:fixed}
  .score-table th{padding:10px 12px;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);text-align:left}
  .score-table td{padding:9px 12px;font-size:14px;border-bottom:1px solid var(--border)}
  .score-table tr:last-child td{border-bottom:none}
  .score-table tr:hover td{background:var(--bg2)}
  .rnd-num{color:var(--muted);font-size:13px}
  .player-th{display:flex;align-items:center;gap:6px}
  .total-row td{font-weight:500;background:var(--bg2);font-size:15px}
  .total-row .leader{color:var(--green-dark);font-weight:700}
  .progress-bar{height:4px;border-radius:2px;background:var(--border);margin-top:4px;overflow:hidden}
  .progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
  .danger .progress-fill{background:var(--red)}
  .prog-cell{padding-bottom:12px!important}

  /* ROUND INPUT */
  .round-input-card{background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--border-radius-lg);padding:1.25rem}
  .round-title{font-size:16px;font-weight:600;margin-bottom:14px}
  .input-grid{display:grid;gap:10px}
  .input-player-row{display:flex;align-items:center;gap:10px}
  .input-player-row .avatar{flex-shrink:0}
  .input-player-row input{max-width:120px}
  .input-player-name{font-size:14px;font-weight:500;flex:1}
  .btn-add-round{margin-top:12px;width:auto;padding:10px 24px}

  /* WINNER SCREEN */
  .winner-screen{max-width:560px;margin:0 auto;text-align:center}
  .trophy{font-size:48px;margin-bottom:8px}
  .winner-title{font-size:28px;font-weight:700;margin-bottom:4px}
  .winner-sub{font-size:15px;color:var(--muted);margin-bottom:24px}
  .rankings{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;text-align:left}
  .rank-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--border-radius-lg)}
  .rank-card.first{border-color:var(--gold);background:var(--gold-light)}
  .rank-medal{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
  .medal1{background:#FAC775;color:#412402} .medal2{background:#D3D1C7;color:#2C2C2A} .medal3{background:#F5C4B3;color:#4A1B0C} .medal4{background:#EEEDFE;color:#26215C}
  .rank-info{flex:1}
  .rank-name{font-size:15px;font-weight:500}
  .rank-score{font-size:13px;color:var(--muted)}
  .rank-pay{text-align:right}
  .pay-amount{font-size:16px;font-weight:600;color:var(--red)}
  .pay-label{font-size:11px;color:var(--muted)}
  .winner-pay{font-size:13px;color:var(--green-dark);background:var(--green-light);padding:2px 10px;border-radius:999px}
  .double-tag{font-size:11px;background:var(--red-light);color:var(--red);padding:2px 8px;border-radius:999px;margin-left:6px}
  .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  /* SAVE CONFIRM */
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--green-dark);color:#E1F5EE;padding:10px 20px;border-radius:var(--border-radius-md);font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
  .toast.show{opacity:1}

  /* HISTORY */
  .history-section{max-width:700px;margin:28px auto 0}
  .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .history-title{font-size:18px;font-weight:700;font-family:'Playfair Display',serif}
  .history-clear{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--border-radius-md);transition:color .15s}
  .history-clear:hover{color:var(--red)}
  .history-empty{text-align:center;padding:28px;color:var(--muted);font-size:14px;background:var(--bg);border:1px dashed var(--border);border-radius:var(--border-radius-lg)}
  .history-list{display:flex;flex-direction:column;gap:10px}
  .history-card{background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--border-radius-lg);overflow:hidden}
  .history-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
  .history-card-header:hover{opacity:.85}
  .history-meta{display:flex;align-items:center;gap:10px}
  .history-winner-badge{font-size:12px;font-weight:500;background:var(--gold-light);color:var(--gold);border:1px solid var(--gold);padding:2px 10px;border-radius:999px}
  .history-date{font-size:12px;color:var(--muted)}
  .history-chevron{font-size:14px;color:var(--muted);transition:transform .2s}
  .history-card.open .history-chevron{transform:rotate(180deg)}
  .history-card-body{display:none;padding:12px 14px}
  .history-card.open .history-card-body{display:block}
  .history-players{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .history-player-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:13px;font-weight:500;background:var(--bg2);border:1px solid var(--border)}
  .history-player-chip.winner-chip{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
  .history-pay-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:13px;font-weight:500;background:var(--red-light);border:1px solid #E8A5A5;color:var(--red)}
  .history-rounds-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .history-rounds-table th{padding:6px 10px;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);text-align:left;background:var(--bg2)}
  .history-rounds-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text)}
  .history-rounds-table tr:last-child td{border-bottom:none}
  .history-rounds-table .total-row td{font-weight:600;background:var(--bg2)}
  .history-rounds-table .winner-col{color:var(--green-dark);font-weight:700}
  .history-pay-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
</style>

<div class="app" id="app">
  <div id="setup-screen" class="setup">
    <h1 class="setup-title"><i class="ti ti-cards" aria-hidden="true"></i> Card Points Tracker</h1>
    <p class="setup-sub">Set up your game — first to 20 points wins!</p>

    <div class="card">
      <div class="card-label">Number of players</div>
      <div class="player-count-row" id="count-btns">
        <button class="cnt-btn" onclick="setCount(2)">2</button>
        <button class="cnt-btn" onclick="setCount(3)">3</button>
        <button class="cnt-btn active" onclick="setCount(4)">4</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Player names</div>
      <div class="player-names" id="player-names-inputs"></div>
    </div>

    <div class="card">
      <div class="card-label">Payment declarations (what losers pay)</div>
      <div class="payment-row" id="payment-inputs"></div>
      <p style="font-size:12px;color:var(--muted);margin-top:8px"><i class="ti ti-info-circle" aria-hidden="true"></i> Players who don't reach 10 points pay double</p>
    </div>

    <button class="btn-primary" onclick="startGame()"><i class="ti ti-player-play" aria-hidden="true"></i> Start Game</button>
  </div>

  <div id="game-screen" class="game" style="display:none">
    <div class="game-header">
      <div>
        <h2 class="game-title" id="game-title">Card Points</h2>
        <span class="target-badge"><i class="ti ti-target" aria-hidden="true"></i> First to 20 wins</span>
      </div>
      <div class="game-actions">
        <button class="btn-secondary" onclick="saveGame()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Save</button>
        <button class="btn-secondary" onclick="confirmNewGame()"><i class="ti ti-plus" aria-hidden="true"></i> New game</button>
      </div>
    </div>

    <div class="score-table">
      <table id="score-table">
        <thead id="score-head"></thead>
        <tbody id="score-body"></tbody>
        <tfoot id="score-foot"></tfoot>
      </table>
    </div>

    <div class="round-input-card" id="round-input">
      <div class="round-title" id="round-label">Round 1 — Enter points</div>
      <div class="input-grid" id="input-grid"></div>
      <button class="btn-primary btn-add-round" onclick="addRound()"><i class="ti ti-check" aria-hidden="true"></i> Add round</button>
    </div>
  </div>

  <div id="winner-screen" class="winner-screen" style="display:none">
    <div class="trophy">🏆</div>
    <h2 class="winner-title" id="winner-name"></h2>
    <p class="winner-sub" id="winner-sub"></p>
    <div class="rankings" id="rankings"></div>
    <div class="action-row">
      <button class="btn-secondary" onclick="saveGame()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Save game</button>
      <button class="btn-primary" style="width:auto;padding:12px 28px;margin-top:0" onclick="confirmNewGame()"><i class="ti ti-refresh" aria-hidden="true"></i> New game</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Game saved!</div>

<div class="history-section" id="history-section">
  <div class="history-header">
    <h3 class="history-title">📋 Previous Games</h3>
    <button class="history-clear" onclick="clearHistory()">Clear history</button>
  </div>
  <div id="history-list"></div>
</div>

<script>
const AVATARS = ['av0','av1','av2','av3'];
const INITIALS_BG = ['#EEEDFE','#E1F5EE','#FAEEDA','#FAECE7'];
const INITIALS_COLOR = ['#3C3489','#085041','#633806','#712B13'];
const MEDALS = ['medal1','medal2','medal3','medal4'];
const MEDAL_LABELS = ['1st','2nd','3rd','4th'];

let state = {
  playerCount: 4,
  players: [],
  payments: [],
  rounds: [],
  totals: [],
  finished: false
};

function setCount(n) {
  state.playerCount = n;
  document.querySelectorAll('.cnt-btn').forEach((b,i) => b.classList.toggle('active', i+2===n));
  renderSetupInputs();
}

function renderSetupInputs() {
  const nc = state.playerCount;
  let namesHtml = '';
  for (let i=0;i<nc;i++) {
    const prev = (state.players[i]||{name:''}).name || '';
    namesHtml += `<div class="pname-row">
      <div class="avatar ${AVATARS[i]}">${String.fromCharCode(65+i)}</div>
      <input type="text" id="pname${i}" placeholder="Player ${i+1}" value="${prev}" maxlength="16">
    </div>`;
  }
  document.getElementById('player-names-inputs').innerHTML = namesHtml;

  const labels = ['2nd place pays','3rd place pays','4th place pays'];
  let payHtml = '';
  for (let i=0;i<nc-1;i++) {
    const prev = state.payments[i] || '';
    payHtml += `<div class="pay-field">
      <label>${labels[i]}</label>
      <input type="number" id="pay${i}" placeholder="$0" min="0" step="0.01" value="${prev}">
    </div>`;
  }
  document.getElementById('payment-inputs').innerHTML = payHtml;
}

function startGame() {
  const nc = state.playerCount;
  state.players = [];
  state.payments = [];
  for (let i=0;i<nc;i++) {
    const name = document.getElementById('pname'+i).value.trim() || ('Player '+(i+1));
    state.players.push({name, initial: name[0].toUpperCase()});
  }
  for (let i=0;i<nc-1;i++) {
    const v = parseFloat(document.getElementById('pay'+i).value)||0;
    state.payments.push(v);
  }
  state.rounds = [];
  state.totals = new Array(nc).fill(0);
  state.finished = false;
  showGame();
}

function showGame() {
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('winner-screen').style.display='none';
  document.getElementById('game-screen').style.display='block';
  renderTable();
  renderInputGrid();
}

function renderTable() {
  const {players, rounds, totals} = state;
  const nc = players.length;

  let headHtml = '<tr><th style="width:60px">Round</th>';
  players.forEach((p,i) => {
    headHtml += `<th><div class="player-th"><div class="avatar ${AVATARS[i]}" style="width:22px;height:22px;font-size:10px">${p.initial}</div>${p.name}</div></th>`;
  });
  headHtml += '</tr>';
  document.getElementById('score-head').innerHTML = headHtml;

  let bodyHtml = '';
  rounds.forEach((r,ri) => {
    bodyHtml += `<tr><td class="rnd-num">${ri+1}</td>`;
    r.forEach(v => { bodyHtml += `<td>${v >= 0 ? '+'+v : v}</td>`; });
    bodyHtml += '</tr>';
  });
  document.getElementById('score-body').innerHTML = bodyHtml;

  let footHtml = '<tr class="total-row"><td style="font-size:13px;color:var(--muted)">Total</td>';
  const maxTotal = Math.max(...totals);
  totals.forEach((t,i) => {
    const isLeader = t === maxTotal && t > 0;
    footHtml += `<td class="${isLeader?'leader':''}">${t}</td>`;
  });
  footHtml += '</tr><tr>';
  footHtml += '<td class="prog-cell" style="font-size:12px;color:var(--muted)">Progress</td>';
  totals.forEach((t,i) => {
    const pct = Math.min(100, Math.round((t/20)*100));
    const danger = t >= 15;
    footHtml += `<td class="prog-cell"><div class="progress-bar ${danger?'danger':''}"><div class="progress-fill" style="width:${pct}%"></div></div><span style="font-size:11px;color:var(--muted)">${pct}%</span></td>`;
  });
  footHtml += '</tr>';
  document.getElementById('score-foot').innerHTML = footHtml;
  document.getElementById('round-label').textContent = `Round ${rounds.length+1} — Enter points`;
}

function renderInputGrid() {
  const {players} = state;
  let html = '';
  players.forEach((p,i) => {
    html += `<div class="input-player-row">
      <div class="avatar ${AVATARS[i]}">${p.initial}</div>
      <span class="input-player-name">${p.name}</span>
      <input type="number" id="rinput${i}" placeholder="Points" min="0" step="1" style="max-width:110px">
    </div>`;
  });
  document.getElementById('input-grid').innerHTML = html;
}

function addRound() {
  const {players, totals} = state;
  const nc = players.length;
  const vals = [];
  for (let i=0;i<nc;i++) {
    const raw = document.getElementById('rinput'+i).value;
    const v = raw==='' ? 0 : parseInt(raw,10)||0;
    vals.push(v);
  }
  state.rounds.push(vals);
  vals.forEach((v,i) => totals[i] += v);

  const winner = totals.findIndex(t => t >= 20);
  if (winner !== -1) {
    renderTable();
    showWinner();
    return;
  }
  renderTable();
  renderInputGrid();
}

function showWinner() {
  state.finished = true;
  state.archived = false;
  document.getElementById('game-screen').style.display='none';
  document.getElementById('winner-screen').style.display='block';

  archiveCurrentGame();
  state.archived = true;

  const {players, totals, payments} = state;
  const nc = players.length;
  const ranked = players.map((p,i) => ({...p, total:totals[i], idx:i}))
    .sort((a,b) => b.total - a.total);

  document.getElementById('winner-name').textContent = ranked[0].name + ' wins!';
  document.getElementById('winner-sub').textContent = `Game over — here's the final standings`;

  let rankHtml = '';
  ranked.forEach((p,pos) => {
    const isFirst = pos === 0;
    let paySection = '';
    if (isFirst) {
      paySection = `<div class="rank-pay"><span class="winner-pay"><i class="ti ti-trophy" aria-hidden="true"></i> Winner</span></div>`;
    } else {
      const declared = payments[pos-1] || 0;
      const belowTen = p.total < 10;
      const finalPay = belowTen ? declared * 2 : declared;
      paySection = `<div class="rank-pay">
        <div class="pay-amount">$${finalPay.toFixed(2)}${belowTen?'<span class="double-tag">×2</span>':''}</div>
        <div class="pay-label">to pay${belowTen?' (below 10pts)':''}</div>
      </div>`;
    }
    rankHtml += `<div class="rank-card ${isFirst?'first':''}">
      <div class="rank-medal ${MEDALS[pos]}">${MEDAL_LABELS[pos]}</div>
      <div class="avatar ${AVATARS[p.idx]}">${p.initial}</div>
      <div class="rank-info">
        <div class="rank-name">${p.name}</div>
        <div class="rank-score">${p.total} points</div>
      </div>
      ${paySection}
    </div>`;
  });
  document.getElementById('rankings').innerHTML = rankHtml;
}

function saveGame() {
  const {players, rounds, totals, payments, finished} = state;
  const lines = ['CARD POINTS GAME SAVE', '====================', ''];
  players.forEach((p,i) => lines.push(`${p.name}: ${totals[i]} pts`));
  lines.push('');
  lines.push('Round-by-round:');
  const header = ['Rnd', ...players.map(p=>p.name)].join('\t');
  lines.push(header);
  rounds.forEach((r,ri) => lines.push([ri+1,...r].join('\t')));
  if (finished) {
    lines.push('');
    lines.push('FINAL STANDINGS:');
    const ranked = players.map((p,i)=>({...p,total:totals[i],idx:i})).sort((a,b)=>b.total-a.total);
    ranked.forEach((p,pos) => {
      if (pos===0) { lines.push(`1st: ${p.name} (WINNER)`); }
      else {
        const declared = payments[pos-1]||0;
        const finalPay = p.total < 10 ? declared*2 : declared;
        lines.push(`${pos+1}${['st','nd','rd','th'][pos]}: ${p.name} — pays $${finalPay.toFixed(2)}${p.total<10?' (doubled — below 10pts)':''}`);
      }
    });
  }
  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'card-game-'+ new Date().toISOString().slice(0,10)+'.txt';
  a.click(); URL.revokeObjectURL(url);
  showToast('Game saved!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function confirmNewGame() {
  if (state.rounds.length > 0 && !state.finished) {
    if (!confirm('Start a new game? Current progress will be lost.')) return;
  }
  if (state.finished && !state.archived) {
    archiveCurrentGame();
  }
  state.playerCount = 4;
  state.players = [];
  state.payments = [];
  state.rounds = [];
  state.totals = [];
  state.finished = false;
  state.archived = false;
  document.getElementById('game-screen').style.display='none';
  document.getElementById('winner-screen').style.display='none';
  document.getElementById('setup-screen').style.display='block';
  renderSetupInputs();
}

/* ── HISTORY ── */
function archiveCurrentGame() {
  const {players, rounds, totals, payments} = state;
  const ranked = players.map((p,i) => ({...p, total: totals[i], idx: i}))
    .sort((a,b) => b.total - a.total);
  const record = {
    date: new Date().toISOString(),
    players: players.map((p,i) => ({name: p.name, initial: p.initial, idx: i, total: totals[i]})),
    ranked: ranked,
    rounds: rounds,
    payments: payments,
    winner: ranked[0].name
  };
  const history = getHistory();
  history.unshift(record);
  localStorage.setItem('cardgame_history', JSON.stringify(history.slice(0, 20)));
  renderHistory();
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('cardgame_history') || '[]'); }
  catch(e) { return []; }
}

function clearHistory() {
  if (!confirm('Clear all game history?')) return;
  localStorage.removeItem('cardgame_history');
  renderHistory();
  showToast('History cleared');
}

function toggleHistoryCard(idx) {
  const card = document.querySelector(`.history-card[data-idx="${idx}"]`);
  if (card) card.classList.toggle('open');
}

function renderHistory() {
  const history = getHistory();
  const container = document.getElementById('history-list');
  const section = document.getElementById('history-section');
  if (history.length === 0) {
    container.innerHTML = '<div class="history-empty">No games played yet. Finish a game to see it here!</div>';
    section.style.display = 'block';
    return;
  }
  section.style.display = 'block';
  let html = '<div class="history-list">';
  history.forEach((g, idx) => {
    const d = new Date(g.date);
    const dateStr = d.toLocaleDateString(undefined, {day:'numeric',month:'short',year:'numeric'}) +
      ' · ' + d.toLocaleTimeString(undefined, {hour:'2-digit',minute:'2-digit'});
    const nc = g.players.length;
    const winnerIdx = g.ranked[0].idx;

    // player chips + payments
    let chips = g.ranked.map((p, pos) => {
      const isW = pos === 0;
      if (isW) {
        return `<div class="history-player-chip winner-chip">
          🏆 <span class="avatar ${AVATARS[p.idx]}" style="width:18px;height:18px;font-size:9px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%">${p.initial}</span>
          <span>${p.name}</span>
          <strong>${p.total}pts</strong>
        </div>`;
      }
      const declared = g.payments[pos-1] || 0;
      const belowTen = p.total < 10;
      const finalPay = belowTen ? declared * 2 : declared;
      const payStr = finalPay > 0 ? ` · 💸 $${finalPay.toFixed(2)}${belowTen?' ×2':''}` : '';
      return `<div class="history-player-chip">
        <span class="avatar ${AVATARS[p.idx]}" style="width:18px;height:18px;font-size:9px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%">${p.initial}</span>
        <span>${p.name}</span>
        <strong>${p.total}pts</strong>${payStr ? `<span style="color:var(--red);font-size:12px">${payStr}</span>` : ''}
      </div>`;
    }).join('');

    // rounds mini-table
    let tableHead = '<tr><th>Rnd</th>' + g.players.map(p => `<th>${p.name}</th>`).join('') + '</tr>';
    let tableBody = g.rounds.map((r, ri) =>
      `<tr><td style="color:var(--muted)">${ri+1}</td>${r.map(v => `<td>${v>=0?'+'+v:v}</td>`).join('')}</tr>`
    ).join('');
    let tableFoot = `<tr class="total-row"><td>Total</td>${g.players.map((p,i) => {
      const isWinner = i === winnerIdx;
      return `<td class="${isWinner?'winner-col':''}">${g.players[i].total}</td>`;
    }).join('')}</tr>`;

    // payment summary
    const hasPayments = g.payments && g.payments.some(p => p > 0);
    let payRowHtml = '';
    if (hasPayments) {
      const payChips = g.ranked.slice(1).map((p, i) => {
        const declared = g.payments[i] || 0;
        const belowTen = p.total < 10;
        const finalPay = belowTen ? declared * 2 : declared;
        if (finalPay === 0) return '';
        return `<div class="history-pay-chip">
          <span class="avatar ${AVATARS[p.idx]}" style="width:16px;height:16px;font-size:8px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:#F5A3A3;color:#6B1111">${p.initial}</span>
          <span>${p.name} pays <strong>$${finalPay.toFixed(2)}</strong>${belowTen?' <span style="font-size:11px">(×2 below 10pts)</span>':''}</span>
        </div>`;
      }).filter(Boolean).join('');
      if (payChips) {
        payRowHtml = `<div class="history-pay-row">${payChips}</div>`;
      }
    }

    html += `<div class="history-card" data-idx="${idx}">
      <div class="history-card-header" onclick="toggleHistoryCard(${idx})">
        <div class="history-meta">
          <span class="history-winner-badge">🏆 ${g.winner}</span>
          <span class="history-date">${dateStr}</span>
          <span style="font-size:12px;color:var(--muted)">${g.rounds.length} rounds · ${nc} players</span>
        </div>
        <span class="history-chevron">▾</span>
      </div>
      <div class="history-card-body">
        <div class="history-players">${chips}</div>
        <table class="history-rounds-table">
          <thead>${tableHead}</thead>
          <tbody>${tableBody}</tbody>
          <tfoot>${tableFoot}</tfoot>
        </table>
        ${payRowHtml}
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

setCount(4);
renderSetupInputs();
renderHistory();
</script>
