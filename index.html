<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Card Game Calculator</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");

    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --soft: #f8fafc;
      --line: rgba(15, 23, 42, 0.12);
      --line-strong: rgba(15, 23, 42, 0.2);
      --panel: rgba(255, 255, 255, 0.82);
      --panel-solid: #ffffff;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --cyan: #06b6d4;
      --green: #22c55e;
      --amber: #f59e0b;
      --rose: #f43f5e;
      --violet: #7c3aed;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
      --shadow-soft: 0 14px 34px rgba(15, 23, 42, 0.1);
      --radius-xl: 28px;
      --radius: 20px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: #eef2ff;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px),
        radial-gradient(circle at 10% 0%, rgba(37, 99, 235, 0.22), transparent 30rem),
        radial-gradient(circle at 90% 4%, rgba(6, 182, 212, 0.24), transparent 26rem),
        linear-gradient(135deg, #f8fafc 0%, #eef2ff 52%, #ecfeff 100%);
      background-size: 44px 44px, 44px 44px, auto, auto, auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.18));
      z-index: -1;
    }

    button, input { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    h1, h2, h3, p { margin: 0; }

    .app-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      position: sticky;
      top: 12px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 22px;
      background: rgba(255,255,255,0.76);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 18px 34px rgba(37,99,235,0.25);
      animation: logoFloat 5s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-4px) rotate(4deg); }
    }

    .brand h1 {
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.05;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .nav-tabs {
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(248,250,252,0.72);
    }

    .nav-tabs button,
    .btn {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 15px;
      color: var(--ink);
      background: rgba(255,255,255,0.82);
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }

    .nav-tabs button {
      border-color: transparent;
      background: transparent;
    }

    .nav-tabs button.active,
    .btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 14px 34px rgba(37,99,235,0.2);
    }

    .btn.danger {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--rose), #fb7185);
    }

    .btn:hover,
    .nav-tabs button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }

    .btn.block { width: 100%; }
    .btn.small { min-height: 36px; padding-inline: 12px; font-size: 13px; }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero-main,
    .glass-panel {
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .hero-main {
      position: relative;
      overflow: hidden;
      min-height: 278px;
      padding: clamp(22px, 4vw, 42px);
    }

    .hero-main::after {
      content: "";
      position: absolute;
      right: -120px;
      bottom: -160px;
      width: 330px;
      height: 330px;
      border-radius: 50%;
      background: rgba(37,99,235,0.14);
    }

    .eyebrow {
      display: inline-flex;
      width: max-content;
      padding: 7px 12px;
      border-radius: 999px;
      color: #1e40af;
      background: rgba(37,99,235,0.12);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin-top: 14px;
      font-size: clamp(38px, 6vw, 86px);
      line-height: .92;
      letter-spacing: 0;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin-top: 16px;
      color: var(--muted);
      font-size: clamp(15px, 1.7vw, 18px);
      line-height: 1.65;
    }

    .metric-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 22px;
    }

    .metric {
      min-height: 90px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.68);
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .deck-stage {
      position: relative;
      min-height: 278px;
      padding: 18px;
      overflow: hidden;
    }

    .deck-card {
      position: absolute;
      width: 164px;
      height: 220px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 24px;
      color: #fff;
      font-size: 58px;
      font-weight: 900;
      box-shadow: 0 32px 56px rgba(15,23,42,0.22);
      transform-style: preserve-3d;
      will-change: transform;
    }

    .deck-card.one { left: 62px; top: 42px; rotate: -14deg; background: linear-gradient(145deg, #111827, #2563eb); }
    .deck-card.two { left: 132px; top: 28px; rotate: 8deg; background: linear-gradient(145deg, #0f766e, #06b6d4); }
    .deck-card.three { left: 96px; top: 82px; rotate: 20deg; background: linear-gradient(145deg, #f43f5e, #f59e0b); }

    .screen { display: none; }
    .screen.active { display: block; }

    .setup-layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .game-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .board-grid {
      display: grid;
      gap: 18px;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 0;
    }

    .panel-body { padding: 18px; }

    .panel-title {
      font-size: clamp(20px, 2.4vw, 28px);
      font-weight: 900;
      letter-spacing: 0;
    }

    .panel-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .section-label {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .setup-form {
      display: grid;
      gap: 16px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .segmented button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.78);
      font-weight: 900;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .segmented button.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 18px 34px rgba(37,99,235,0.2);
    }

    .segmented button:hover { transform: translateY(-2px); box-shadow: var(--shadow-soft); }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0 14px;
      color: var(--ink);
      background: rgba(255,255,255,.86);
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    input:focus {
      border-color: rgba(37,99,235,.7);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .field-list {
      display: grid;
      gap: 10px;
    }

    .player-field {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .payment-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.4);
      flex: 0 0 auto;
    }

    .av0 { background: linear-gradient(135deg, #2563eb, #7c3aed); }
    .av1 { background: linear-gradient(135deg, #0f766e, #06b6d4); }
    .av2 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .av3 { background: linear-gradient(135deg, #db2777, #8b5cf6); }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .score-card {
      position: relative;
      min-height: 190px;
      overflow: hidden;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 14px 28px rgba(15,23,42,.08);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }

    .score-card::after {
      content: "";
      position: absolute;
      inset: auto -50px -70px auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(37,99,235,.08);
    }

    .score-card.leader {
      border-color: rgba(34,197,94,.62);
      box-shadow: 0 22px 46px rgba(34,197,94,.16);
      background: linear-gradient(160deg, rgba(255,255,255,.95), rgba(240,253,244,.92));
    }

    .score-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-soft); }

    .score-card-place {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 34px;
      padding: 0 10px;
      border-radius: 14px;
      color: #92400e;
      background: rgba(245,158,11,.18);
      font-size: 13px;
      font-weight: 900;
    }

    .score-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      width: max-content;
      max-width: 100%;
      padding: 6px 10px;
      border-radius: 999px;
      color: #1e40af;
      background: rgba(37,99,235,.11);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .pill.green { color: #166534; background: rgba(34,197,94,.14); }
    .pill.amber { color: #92400e; background: rgba(245,158,11,.16); }
    .pill.rose { color: #be123c; background: rgba(244,63,94,.14); }

    .score-name {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      font-size: 15px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .score-total {
      position: relative;
      z-index: 1;
      margin-top: 5px;
      font-size: clamp(34px, 4vw, 48px);
      font-weight: 900;
      line-height: 1;
    }

    .score-meta {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 7px;
      margin-top: 13px;
    }

    .score-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .score-meta-row strong {
      color: var(--ink);
      text-align: right;
    }

    .progress {
      position: relative;
      z-index: 1;
      height: 10px;
      margin-top: 15px;
      border-radius: 999px;
      background: rgba(15,23,42,.1);
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      transition: width .3s ease;
    }

    .leader .progress span { background: linear-gradient(90deg, var(--green), var(--cyan)); }

    .round-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
    }

    .round-form {
      display: grid;
      gap: 10px;
    }

    .round-row {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 112px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.72);
    }

    .round-row strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .round-row span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .pulse-panel {
      display: grid;
      gap: 12px;
      align-content: start;
      min-height: 100%;
      padding: 16px;
      border-radius: 22px;
      color: #fff;
      background: linear-gradient(145deg, rgba(15,23,42,.96), rgba(29,78,216,.92));
      box-shadow: var(--shadow-soft);
    }

    .pulse-panel h3 { font-size: 18px; }

    .pulse-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 700;
    }

    .pulse-row strong { color: #fff; text-align: right; }

    .standings-list {
      display: grid;
      gap: 10px;
    }

    .standing-card {
      display: grid;
      grid-template-columns: 52px 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.76);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .standing-card.leader {
      border-color: rgba(245,158,11,.6);
      background: linear-gradient(135deg, rgba(255,251,235,.98), rgba(255,255,255,.82));
      box-shadow: 0 18px 34px rgba(245,158,11,.14);
    }

    .standing-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-soft); }

    .place {
      display: grid;
      place-items: center;
      width: 52px;
      height: 44px;
      border-radius: 16px;
      color: #92400e;
      background: rgba(245,158,11,.16);
      font-size: 13px;
      font-weight: 900;
    }

    .standing-name {
      min-width: 0;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .standing-name span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .standing-points {
      text-align: right;
      font-size: 22px;
      font-weight: 900;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,.76);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 560px;
    }

    th, td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    tr:last-child td { border-bottom: 0; }

    .mobile-rounds {
      display: none;
      gap: 10px;
    }

    .round-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.78);
    }

    .round-card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      font-weight: 900;
    }

    .round-card-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 7px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .winner-screen {
      min-height: calc(100vh - 122px);
      display: grid;
      place-items: center;
    }

    .winner-card {
      position: relative;
      overflow: hidden;
      width: min(1120px, 100%);
      border: 1px solid rgba(255,255,255,.34);
      border-radius: 38px;
      color: #fff;
      background:
        radial-gradient(circle at 16% 16%, rgba(250, 204, 21, .34), transparent 17rem),
        radial-gradient(circle at 84% 12%, rgba(6, 182, 212, .32), transparent 18rem),
        linear-gradient(135deg, #070b18 0%, #111827 32%, #1d4ed8 78%, #06b6d4 100%);
      box-shadow: 0 40px 110px rgba(15,23,42,.42);
      animation: winnerEnter .75s cubic-bezier(.2,.9,.2,1) both;
    }

    .winner-card::before {
      content: "";
      position: absolute;
      inset: -34% auto auto 50%;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      background: conic-gradient(from 90deg, rgba(255,255,255,.08), rgba(250,204,21,.22), rgba(6,182,212,.16), rgba(255,255,255,.08));
      animation: winnerAura 12s linear infinite;
    }

    .winner-card::after {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 30px;
      pointer-events: none;
    }

    .winner-content {
      position: relative;
      z-index: 1;
      padding: clamp(24px, 5vw, 58px);
    }

    .winner-title {
      font-size: clamp(54px, 10vw, 140px);
      line-height: .82;
      letter-spacing: 0;
      color: transparent;
      background: linear-gradient(90deg, #fef3c7, #facc15 35%, #fff 52%, #67e8f9 78%, #fef3c7);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 18px 32px rgba(250,204,21,.22));
      animation: winnerShine 3.6s ease-in-out infinite;
    }

    .winner-sub {
      max-width: 680px;
      margin-top: 16px;
      color: rgba(255,255,255,.78);
      font-size: 17px;
      line-height: 1.6;
    }

    .winner-center {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 360px);
      gap: 18px;
      align-items: stretch;
      margin-top: 24px;
    }

    .champion-panel,
    .amount-panel {
      position: relative;
      overflow: hidden;
      padding: 22px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 28px;
      background: rgba(255,255,255,.11);
      box-shadow: 0 24px 60px rgba(0,0,0,.18);
      backdrop-filter: blur(16px);
    }

    .champion-panel {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
    }

    .trophy-badge {
      width: 96px;
      height: 96px;
      display: grid;
      place-items: center;
      border-radius: 30px;
      color: #78350f;
      background: linear-gradient(135deg, #fef3c7, #f59e0b);
      box-shadow: 0 22px 42px rgba(245,158,11,.34);
      font-size: 48px;
      animation: trophyPulse 2.2s ease-in-out infinite;
    }

    .champion-label {
      display: block;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .champion-name {
      margin-top: 6px;
      font-size: clamp(34px, 5vw, 66px);
      line-height: .95;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .champion-points {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .winner-stat-pill {
      padding: 8px 12px;
      border-radius: 999px;
      color: #fff;
      background: rgba(255,255,255,.13);
      font-size: 13px;
      font-weight: 900;
    }

    .amount-panel {
      display: grid;
      align-content: center;
      text-align: center;
      background: linear-gradient(160deg, rgba(250,204,21,.28), rgba(255,255,255,.1));
    }

    .amount-panel span {
      color: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .winner-amount {
      margin-top: 8px;
      color: #fef3c7;
      font-size: clamp(42px, 7vw, 78px);
      line-height: 1;
      font-weight: 900;
      text-shadow: 0 18px 40px rgba(250,204,21,.28);
    }

    .winner-sparkle {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 18px #facc15;
      animation: sparkle 2.4s ease-in-out infinite;
    }

    .winner-sparkle.one { left: 8%; top: 18%; }
    .winner-sparkle.two { right: 12%; top: 30%; animation-delay: .6s; }
    .winner-sparkle.three { left: 44%; bottom: 16%; animation-delay: 1.2s; }

    .winner-rankings {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 26px;
    }

    .winner-rank {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(12px);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .winner-rank:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 42px rgba(0,0,0,.18);
    }

    .winner-rank.rank-gold {
      color: #451a03;
      border-color: rgba(251,191,36,.55);
      background: linear-gradient(135deg, #fef3c7, #f59e0b);
    }

    .winner-rank.rank-silver {
      color: #1f2937;
      border-color: rgba(226,232,240,.7);
      background: linear-gradient(135deg, #f8fafc, #94a3b8);
    }

    .winner-rank.rank-bronze {
      color: #431407;
      border-color: rgba(251,146,60,.55);
      background: linear-gradient(135deg, #fed7aa, #c2410c);
    }

    .winner-rank.rank-blue {
      color: #e0f2fe;
      border-color: rgba(125,211,252,.35);
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    .winner-place {
      display: grid;
      place-items: center;
      width: 58px;
      height: 50px;
      border-radius: 18px;
      color: inherit;
      background: rgba(255,255,255,.22);
      font-size: 13px;
      font-weight: 900;
    }

    .winner-rank strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .winner-rank span {
      display: block;
      margin-top: 3px;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 800;
    }

    .winner-rank.rank-gold span,
    .winner-rank.rank-silver span,
    .winner-rank.rank-bronze span {
      color: rgba(15,23,42,.68);
    }

    .winner-pay-total {
      text-align: right;
      font-size: 20px;
      font-weight: 900;
      white-space: nowrap;
    }

    @keyframes winnerEnter {
      from { opacity: 0; transform: translateY(34px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes winnerAura {
      to { rotate: 360deg; }
    }

    @keyframes winnerShine {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes trophyPulse {
      0%, 100% { transform: translateY(0) rotate(-4deg) scale(1); }
      50% { transform: translateY(-6px) rotate(4deg) scale(1.05); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: .35; transform: scale(.8); }
      50% { opacity: 1; transform: scale(1.55); }
    }

    .history-screen {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      width: 100%;
      min-height: auto;
      display: block;
      border-radius: 18px;
      padding: 14px;
      text-align: left;
      white-space: normal;
      background: rgba(255,255,255,.78);
    }

    .history-item.active {
      border-color: rgba(37,99,235,.5);
      background: linear-gradient(135deg, rgba(239,246,255,.98), rgba(255,255,255,.86));
      box-shadow: var(--shadow-soft);
    }

    .history-item strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .history-item span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.4;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.72);
    }

    .detail-stat strong { display: block; font-size: 24px; }
    .detail-stat span { color: var(--muted); font-size: 12px; font-weight: 800; }

    .empty-state {
      padding: 42px 22px;
      border: 1px dashed var(--line-strong);
      border-radius: 22px;
      color: var(--muted);
      background: rgba(255,255,255,.58);
      text-align: center;
      font-weight: 800;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 50;
    }

    .confetti span {
      position: absolute;
      top: -24px;
      width: 10px;
      height: 16px;
      border-radius: 3px;
      background: var(--blue);
      animation: confettiFall 3.6s linear forwards;
    }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: .2; }
    }

    @media (max-width: 1180px) {
      .hero { grid-template-columns: 1fr 280px; }
      .deck-card { width: 130px; height: 182px; font-size: 46px; }
      .deck-card.one { left: 36px; }
      .deck-card.two { left: 100px; }
      .deck-card.three { left: 66px; }
      .setup-layout, .game-layout { grid-template-columns: 1fr; }
      .score-grid { grid-template-columns: repeat(2, 1fr); }
      .history-screen { grid-template-columns: 320px minmax(0, 1fr); }
    }

    @media (max-width: 820px) {
      .topbar { position: static; align-items: stretch; flex-direction: column; }
      .brand h1 { white-space: normal; }
      .nav-tabs { display: grid; grid-template-columns: 1fr 1fr; width: 100%; border-radius: 18px; }
      .hero { grid-template-columns: 1fr; }
      .deck-stage { display: none; }
      .metric-grid, .detail-grid { grid-template-columns: repeat(2, 1fr); }
      .round-layout { grid-template-columns: 1fr; }
      .payment-grid { grid-template-columns: 1fr; }
      .history-screen { grid-template-columns: 1fr; }
      .winner-rankings { grid-template-columns: 1fr; }
      .winner-center { grid-template-columns: 1fr; }
      .champion-panel { grid-template-columns: 76px minmax(0, 1fr); }
      .trophy-badge { width: 76px; height: 76px; border-radius: 24px; font-size: 38px; }
    }

    @media (max-width: 560px) {
      .app-shell { padding: 10px; }
      .hero-main, .glass-panel { border-radius: 22px; }
      .hero-main { padding: 20px; min-height: auto; }
      .hero-title { font-size: 42px; }
      .metric-grid, .score-grid, .detail-grid { grid-template-columns: 1fr; }
      .panel-head { flex-direction: column; }
      .round-row { grid-template-columns: 44px minmax(0, 1fr); }
      .round-row input { grid-column: 1 / -1; }
      .quick-actions { grid-template-columns: repeat(2, 1fr); }
      .table-wrap { display: none; }
      .mobile-rounds { display: grid; }
      .standing-card { grid-template-columns: 48px 40px minmax(0, 1fr); }
      .standing-points { grid-column: 1 / -1; text-align: left; padding-left: 102px; }
      .winner-content { padding: 22px; }
      .winner-title { font-size: 46px; }
      .champion-panel { grid-template-columns: 1fr; text-align: center; justify-items: center; }
      .champion-points { justify-content: center; }
      .winner-rank { grid-template-columns: 48px minmax(0, 1fr); }
      .winner-pay-total { grid-column: 1 / -1; text-align: left; padding-left: 60px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js" crossorigin></script>
  <script>
    const { useEffect, useMemo, useState } = React;
    const h = React.createElement;
    const places = ["1st", "2nd", "3rd", "4th"];
    const avatarClasses = ["av0", "av1", "av2", "av3"];
    const defaults = ["", "", "", ""];

    function money(value) {
      return "$" + Number(value || 0).toFixed(2);
    }

    function asNumber(value, fallback = 0) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem("cardgame_history") || "[]");
      } catch {
        return [];
      }
    }

    function saveHistory(history) {
      localStorage.setItem("cardgame_history", JSON.stringify(history.slice(0, 30)));
    }

    function Avatar({ player, index }) {
      return h("div", { className: `avatar ${avatarClasses[index]}` }, player?.initial || String.fromCharCode(65 + index));
    }

    function Button({ children, className = "", ...props }) {
      return h("button", { className: `btn ${className}`, type: "button", ...props }, children);
    }

    function rankedPlayers(players, totals) {
      return players
        .map((player, index) => ({ ...player, index, total: totals[index] || 0 }))
        .sort((a, b) => b.total - a.total || a.index - b.index);
    }

    function payoutDetails(ranked, payments) {
      const byIndex = {};
      const groups = [];
      let cursor = 0;
      let winnerAmount = 0;

      while (cursor < ranked.length) {
        const total = ranked[cursor].total;
        const members = [];
        while (cursor < ranked.length && ranked[cursor].total === total) {
          members.push(ranked[cursor]);
          cursor += 1;
        }
        const placeStart = cursor - members.length;
        const placeEnd = cursor - 1;
        groups.push({ members, placeStart, placeEnd, total });
      }

      groups.forEach((group) => {
        const occupiedPlaces = Array.from({ length: group.placeEnd - group.placeStart + 1 }, (_, index) => group.placeStart + index);
        const declaredTotal = occupiedPlaces.reduce((sum, place) => sum + (place === 0 ? 0 : Number(payments[place - 1] || 0)), 0);
        const basePay = group.placeStart === 0 ? 0 : declaredTotal / group.members.length;

        group.members.forEach((player) => {
          const pay = group.placeStart === 0 ? 0 : (player.total < 10 ? basePay * 2 : basePay);
          winnerAmount += pay;
          byIndex[player.index] = {
            pay,
            receive: 0,
            place: group.placeStart,
            placeEnd: group.placeEnd,
            tied: group.members.length > 1,
            groupSize: group.members.length
          };
        });
      });

      const winnerGroup = groups[0] || { members: [] };
      const winnerShare = winnerGroup.members.length ? winnerAmount / winnerGroup.members.length : 0;
      winnerGroup.members.forEach((player) => {
        byIndex[player.index].receive = winnerShare;
      });

      return {
        byIndex,
        winnerAmount,
        winnerShare,
        winnerNames: winnerGroup.members.map((player) => player.name),
        winnerCount: winnerGroup.members.length
      };
    }

    function calculatePay(player, place, payments, ranked = null) {
      if (ranked) return payoutDetails(ranked, payments).byIndex[player.index]?.pay || 0;
      if (place === 0) return 0;
      const declared = payments[place - 1] || 0;
      return player.total < 10 ? declared * 2 : declared;
    }

    function winnerAmountFor(record) {
      if (!record?.ranked?.length) return 0;
      return payoutDetails(record.ranked, record.payments || []).winnerAmount;
    }

    function App() {
      const [screen, setScreen] = useState("game");
      const [playerCount, setPlayerCount] = useState(4);
      const [target, setTarget] = useState(20);
      const [names, setNames] = useState(defaults);
      const [payments, setPayments] = useState(["", "", ""]);
      const [players, setPlayers] = useState([]);
      const [rounds, setRounds] = useState([]);
      const [roundInput, setRoundInput] = useState(["", "", "", ""]);
      const [history, setHistory] = useState(getHistory);
      const [selectedHistory, setSelectedHistory] = useState(0);
      const [winnerRecord, setWinnerRecord] = useState(null);
      const [confetti, setConfetti] = useState([]);

      const totals = useMemo(() => {
        const next = new Array(players.length).fill(0);
        rounds.forEach((round) => round.forEach((score, index) => next[index] += score));
        return next;
      }, [players, rounds]);

      const ranking = useMemo(() => rankedPlayers(players, totals), [players, totals]);
      const started = players.length > 0;

      useEffect(() => {
        if (window.anime) {
          window.anime({
            targets: ".deck-card",
            translateY: [-8, 8],
            rotateZ: (el, i) => [-8 + i * 7, 4 + i * 8],
            direction: "alternate",
            loop: true,
            easing: "easeInOutSine",
            duration: 2400,
            delay: window.anime.stagger(260)
          });
        }
      }, []);

      useEffect(() => {
        if (window.anime && started) {
          window.anime({
            targets: ".score-card",
            translateY: [18, 0],
            opacity: [0, 1],
            delay: window.anime.stagger(70),
            duration: 520,
            easing: "easeOutCubic"
          });
        }
      }, [rounds.length, started]);

      function updateName(index, value) {
        const next = [...names];
        next[index] = value;
        setNames(next);
      }

      function updatePayment(index, value) {
        const next = [...payments];
        next[index] = value;
        setPayments(next);
      }

      function startGame() {
        const activeNames = names.slice(0, playerCount).map((name) => name.trim());
        const activePayments = payments.slice(0, playerCount - 1);
        if (activeNames.some((name) => !name)) {
          alert("Please enter all player names before starting the game.");
          return;
        }
        if (activePayments.some((payment) => payment === "" || !Number.isFinite(Number(payment)) || Number(payment) < 0)) {
          alert("Please enter all payment declarations before starting the game.");
          return;
        }
        const nextPlayers = Array.from({ length: playerCount }, (_, index) => {
          const name = activeNames[index];
          return { name, initial: name.slice(0, 1).toUpperCase() || String.fromCharCode(65 + index) };
        });
        setPlayers(nextPlayers);
        setRounds([]);
        setRoundInput(new Array(playerCount).fill(""));
        setTarget(Math.max(5, Math.round(asNumber(target, 20))));
        setWinnerRecord(null);
        setScreen("game");
        setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 0);
      }

      function resetGameToSetup(nextScreen = "game") {
        setPlayers([]);
        setRounds([]);
        setRoundInput(new Array(playerCount).fill(""));
        setNames(defaults);
        setPayments(["", "", ""]);
        setWinnerRecord(null);
        setConfetti([]);
        setScreen(nextScreen);
        setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 0);
      }

      function openGameScreen() {
        if (winnerRecord) {
          resetGameToSetup("game");
          return;
        }
        setScreen("game");
      }

      function addRound() {
        if (!started) {
          startGame();
          return;
        }
        const scores = players.map((_, index) => Math.max(0, Math.round(asNumber(roundInput[index], 0))));
        const nextRounds = [...rounds, scores];
        const nextTotals = new Array(players.length).fill(0);
        nextRounds.forEach((round) => round.forEach((score, index) => nextTotals[index] += score));
        setRounds(nextRounds);
        setRoundInput(new Array(players.length).fill(""));

        if (nextTotals.some((score) => score >= target)) {
          const nextRanking = rankedPlayers(players, nextTotals);
          const recordPayments = payments.slice(0, players.length - 1).map((payment) => Number(payment));
          const payout = payoutDetails(nextRanking, recordPayments);
          const record = {
            id: Date.now(),
            date: new Date().toISOString(),
            target,
            players,
            rounds: nextRounds,
            totals: nextTotals,
            payments: recordPayments,
            ranked: nextRanking,
            winner: payout.winnerNames.join(" & "),
            winnerAmount: payout.winnerAmount,
            winnerShare: payout.winnerShare
          };
          const nextHistory = [record, ...history].slice(0, 30);
          setHistory(nextHistory);
          saveHistory(nextHistory);
          setWinnerRecord(record);
          setConfetti(Array.from({ length: 58 }, (_, index) => ({
            id: index,
            left: Math.random() * 100,
            delay: Math.random() * 1.4,
            color: ["#2563eb", "#06b6d4", "#f59e0b", "#f43f5e", "#22c55e"][index % 5]
          })));
          setScreen("winner");
          setTimeout(() => setConfetti([]), 3900);
        }
      }

      function newGame() {
        if (started && rounds.length && !winnerRecord && screen !== "winner" && !confirm("Start a new game? Current progress will be lost.")) return;
        resetGameToSetup("game");
      }

      function fillRound(value) {
        setRoundInput(new Array(started ? players.length : playerCount).fill(String(value)));
      }

      function downloadScoreSheet(record = null) {
        const source = record || { target, players, rounds, totals, payments, ranked: ranking };
      if (!source.players.length) return;
      const totalWon = source.winnerAmount ?? winnerAmountFor(source);
      const lines = [
        "CARD GAME CALCULATOR",
        "====================",
        "",
        `Target: ${source.target}`,
        `Rounds: ${source.rounds.length}`,
        `Winner amount: ${money(totalWon)}`,
        "",
        "Standings:"
      ];
        const payout = payoutDetails(source.ranked, source.payments || []);
        source.ranked.forEach((player, place) => {
          const detail = payout.byIndex[player.index] || { place, pay: 0, receive: 0, tied: false };
          const amountText = detail.place === 0 ? `receives ${money(detail.receive)}` : `pays ${money(detail.pay)}`;
          lines.push(`${places[detail.place]}${detail.tied ? " tie" : ""} - ${player.name}: ${player.total} pts (${amountText})`);
        });
        lines.push("", "Round data:");
        lines.push(["Round", ...source.players.map((p) => p.name)].join("\t"));
        source.rounds.forEach((round, index) => lines.push([index + 1, ...round].join("\t")));
        const blob = new Blob([lines.join("\n")], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `card-game-${new Date().toISOString().slice(0, 10)}.txt`;
        link.click();
        URL.revokeObjectURL(url);
      }

      function clearHistory() {
        if (!history.length || !confirm("Clear all previous game data?")) return;
        setHistory([]);
        setSelectedHistory(0);
        localStorage.removeItem("cardgame_history");
      }

      const activeHistory = history[selectedHistory] || null;

      return h(React.Fragment, null,
        h("div", { className: "app-shell" },
          h(Topbar, { screen, setScreen, openGameScreen, historyCount: history.length }),
          screen === "winner" && winnerRecord
            ? h(WinnerScreen, { record: winnerRecord, onNew: newGame, onHistory: () => setScreen("history"), onDownload: downloadScoreSheet })
            : h(React.Fragment, null,
                h(Hero, { playerCount, target, rounds, started, leader: ranking[0] }),
                h("section", { className: `screen ${screen === "game" ? "active" : ""}` },
                  !started
                    ? h(SetupScreen, {
                        playerCount, setPlayerCount, target, setTarget, names, updateName,
                        payments, updatePayment, startGame
                      })
                    : h(GameScreen, {
                        players, totals, ranking, target, rounds, roundInput, setRoundInput,
                        payments, addRound, fillRound, newGame, downloadScoreSheet
                      })
                ),
                h("section", { className: `screen ${screen === "history" ? "active" : ""}` },
                  h(HistoryScreen, { history, selectedHistory, setSelectedHistory, activeHistory, clearHistory, downloadScoreSheet, onNewGame: newGame })
                )
              )
        ),
        confetti.length
          ? h("div", { className: "confetti" }, confetti.map((item) =>
              h("span", { key: item.id, style: { left: `${item.left}%`, animationDelay: `${item.delay}s`, background: item.color } })
            ))
          : null
      );
    }

    function Topbar({ screen, setScreen, openGameScreen, historyCount }) {
      return h("header", { className: "topbar" },
        h("div", { className: "brand" },
          h("div", { className: "brand-mark" }, "A"),
          h("div", null, h("h1", null, "Card Game Calculator"), h("span", null, "Responsive score tracker"))
        ),
        h("nav", { className: "nav-tabs", "aria-label": "Screens" },
          h("button", { type: "button", className: screen !== "history" ? "active" : "", onClick: openGameScreen }, "Game"),
          h("button", { type: "button", className: screen === "history" ? "active" : "", onClick: () => setScreen("history") }, `Previous Games ${historyCount ? `(${historyCount})` : ""}`)
        )
      );
    }

    function Hero({ playerCount, target, rounds, started, leader }) {
      return h("section", { className: "hero" },
        h("div", { className: "hero-main" },
          h("span", { className: "eyebrow" }, "React powered tracker"),
          h("h2", { className: "hero-title" }, started ? "Live Game Board" : "Score Every Round Clearly"),
          h("p", { className: "hero-copy" },
            started
              ? "Desktop, tablet, and mobile all get their own layout rhythm: live score cards, permanent standings, round input, and history at a glance."
              : "A polished card game calculator with animated score cards, responsive controls, full previous-game screens, and a winner celebration."
          ),
          h("div", { className: "metric-grid" },
            h("div", { className: "metric" }, h("strong", null, playerCount), h("span", null, "Players")),
            h("div", { className: "metric" }, h("strong", null, target), h("span", null, "Target score")),
            h("div", { className: "metric" }, h("strong", null, rounds.length), h("span", null, "Rounds played")),
            h("div", { className: "metric" }, h("strong", null, leader?.name || "Ready"), h("span", null, "Current leader"))
          )
        ),
        h("aside", { className: "glass-panel deck-stage", "aria-hidden": "true" },
          h("div", { className: "deck-card one" }, "A"),
          h("div", { className: "deck-card two" }, "K"),
          h("div", { className: "deck-card three" }, "Q")
        )
      );
    }

    function SetupScreen({ playerCount, setPlayerCount, target, setTarget, names, updateName, payments, updatePayment, startGame }) {
      return h("div", { className: "setup-layout" },
        h("section", { className: "glass-panel" },
          h("div", { className: "panel-head" },
            h("div", null, h("h2", { className: "panel-title" }, "Game Setup"), h("p", { className: "panel-sub" }, "Choose players, names, target score, and payment rules."))
          ),
          h("div", { className: "panel-body setup-form" },
            h("div", null,
              h("div", { className: "section-label" }, "Number of players"),
              h("div", { className: "segmented" }, [2, 3, 4].map((count) =>
                h("button", { key: count, type: "button", className: playerCount === count ? "active" : "", onClick: () => setPlayerCount(count) }, count)
              ))
            ),
            h("div", null,
              h("label", { htmlFor: "target" }, "Winning target"),
              h("input", { id: "target", type: "number", min: 5, max: 999, value: target, onChange: (event) => setTarget(Math.max(5, asNumber(event.target.value, 20))) })
            ),
            h("div", null,
              h("div", { className: "section-label" }, "Player names"),
              h("div", { className: "field-list" }, Array.from({ length: playerCount }, (_, index) =>
                h("div", { className: "player-field", key: index },
                  h(Avatar, { index }),
                  h("input", { type: "text", value: names[index] || "", maxLength: 18, required: true, placeholder: `Player ${index + 1}`, onChange: (event) => updateName(index, event.target.value) })
                )
              ))
            ),
            h("div", null,
              h("div", { className: "section-label" }, "Payment declarations"),
              h("div", { className: "payment-grid" }, Array.from({ length: playerCount - 1 }, (_, index) =>
                h("div", { key: index },
                  h("label", null, `${places[index + 1]} place pays`),
                  h("input", { type: "number", min: 0, step: "0.01", required: true, value: payments[index] || "", placeholder: "$0", onChange: (event) => updatePayment(index, event.target.value) })
                )
              )),
              h("p", { className: "hint", style: { marginTop: "8px" } }, "Players below 10 points pay double their declared amount.")
            ),
            h(Button, { className: "primary block", onClick: startGame }, "Start Game")
          )
        ),
        h("aside", { className: "glass-panel" },
          h("div", { className: "panel-head" },
            h("div", null, h("h2", { className: "panel-title" }, "How It Works"), h("p", { className: "panel-sub" }, "Built for table play on any device."))
          ),
          h("div", { className: "panel-body" },
            h("div", { className: "standings-list" },
              ["Set player names once", "Enter every round quickly", "Watch standings update live", "Open full previous-game data anytime"].map((text, index) =>
                h("div", { className: "standing-card", key: text },
                  h("div", { className: "place" }, places[index]),
                  h(Avatar, { index }),
                  h("div", { className: "standing-name" }, text, h("span", null, "Responsive layout step")),
                  h("div", { className: "standing-points" }, index + 1)
                )
              )
            )
          )
        )
      );
    }

    function GameScreen(props) {
      const { players, totals, ranking, target, rounds, roundInput, setRoundInput, payments, addRound, fillRound, newGame, downloadScoreSheet } = props;
      return h("div", { className: "board-grid" },
        h("div", { className: "board-grid" },
          h("section", { className: "glass-panel" },
            h("div", { className: "panel-head" },
              h("div", null, h("h2", { className: "panel-title" }, "Score Tracker & Standings"), h("p", { className: "panel-sub" }, "Each player card shows current place, points, progress, and payment status in one view.")),
              h("div", { style: { display: "flex", gap: "8px", flexWrap: "wrap", justifyContent: "flex-end" } },
                h(Button, { className: "small", onClick: () => downloadScoreSheet() }, "Download"),
                h(Button, { className: "small", onClick: newGame }, "New Game")
              )
            ),
            h("div", { className: "panel-body" }, h(ScoreGrid, { players, totals, target, ranking, payments }))
          ),
          h("section", { className: "glass-panel" },
            h("div", { className: "panel-head" },
              h("div", null, h("h2", { className: "panel-title" }, `Round ${rounds.length + 1}`), h("p", { className: "panel-sub" }, "Add points for each player."))
            ),
            h("div", { className: "panel-body" },
              h("div", { className: "round-layout" },
                h("div", null,
                  h("div", { className: "round-form" }, players.map((player, index) =>
                    h("div", { className: "round-row", key: player.name + index },
                      h(Avatar, { player, index }),
                      h("div", null, h("strong", null, player.name), h("span", null, `${totals[index]} total points`)),
                      h("input", { type: "number", min: 0, step: 1, value: roundInput[index] || "", placeholder: "0", onChange: (event) => {
                        const next = [...roundInput];
                        next[index] = event.target.value;
                        setRoundInput(next);
                      } })
                    )
                  )),
                  h("div", { className: "quick-actions" },
                    [0, 5, 10].map((value) => h(Button, { key: value, className: "small", onClick: () => fillRound(value) }, `All ${value}`)),
                    h(Button, { className: "small", onClick: () => fillRound("") }, "Clear")
                  ),
                  h(Button, { className: "primary block", style: { marginTop: "12px" }, onClick: addRound }, "Add Round")
                ),
                h(PulsePanel, { ranking, rounds, target, totals })
              )
            )
          ),
          h(RoundHistory, { players, rounds, totals })
        )
      );
    }

    function ScoreGrid({ players, totals, target, ranking, payments }) {
      const leaderIndex = ranking[0]?.index;
      const payout = payoutDetails(ranking, payments.map((payment) => Number(payment || 0)));
      return h("div", { className: "score-grid" }, ranking.map((player, place) => {
        const index = player.index;
        const total = totals[index] || 0;
        const percent = Math.min(100, Math.round((total / target) * 100));
        const isLeader = index === leaderIndex && total > 0;
        const detail = payout.byIndex[index] || { place, pay: 0, receive: 0, tied: false };
        const placeLabel = `${places[detail.place]}${detail.tied ? " tie" : ""}`;
        const payText = detail.place === 0 ? `${money(detail.receive)} winning share` : `${money(detail.pay)} if game ends`;
        return h("article", { className: `score-card ${isLeader ? "leader" : ""}`, key: player.name + index },
          h("div", { className: "score-top" },
            h("div", { style: { display: "flex", alignItems: "center", gap: "10px" } },
              h(Avatar, { player, index }),
              h("span", { className: "score-card-place" }, placeLabel)
            ),
            h("span", { className: `pill ${isLeader ? "green" : ""}` }, isLeader ? "Winning" : `${Math.max(0, target - total)} left`)
          ),
          h("div", { className: "score-name" }, player.name),
          h("div", { className: "score-total" }, total),
          h("div", { className: "progress" }, h("span", { style: { width: `${percent}%` } })),
          h("div", { className: "score-meta" },
            h("div", { className: "score-meta-row" }, h("span", null, "Position"), h("strong", null, `${placeLabel} place`)),
            h("div", { className: "score-meta-row" }, h("span", null, "Payment"), h("strong", null, payText)),
            h("div", { className: "score-meta-row" }, h("span", null, "Progress"), h("strong", null, `${percent}%`))
          )
        );
      }));
    }

    function PulsePanel({ ranking, rounds, target, totals }) {
      const leader = ranking[0];
      const average = totals.length ? Math.round(totals.reduce((sum, score) => sum + score, 0) / totals.length) : 0;
      return h("aside", { className: "pulse-panel" },
        h("h3", null, "Game Pulse"),
        h("div", { className: "pulse-row" }, h("span", null, "Leader"), h("strong", null, leader?.name || "None")),
        h("div", { className: "pulse-row" }, h("span", null, "Rounds played"), h("strong", null, rounds.length)),
        h("div", { className: "pulse-row" }, h("span", null, "Average points"), h("strong", null, average)),
        h("div", { className: "pulse-row" }, h("span", null, "Win distance"), h("strong", null, `${Math.max(0, target - (leader?.total || 0))} pts`))
      );
    }

    function Standings({ ranking, payments }) {
      return h("div", { className: "standings-list" }, ranking.map((player, place) =>
        h("article", { className: `standing-card ${place === 0 ? "leader" : ""}`, key: player.name + player.index },
          h("div", { className: "place" }, places[place]),
          h(Avatar, { player, index: player.index }),
          h("div", { className: "standing-name" }, player.name, h("span", null, place === 0 ? "Currently winning" : `${money(calculatePay(player, place, payments))} if game ends`)),
          h("div", { className: "standing-points" }, player.total)
        )
      ));
    }

    function RoundHistory({ players, rounds, totals }) {
      return h("section", { className: "glass-panel" },
        h("div", { className: "panel-head" }, h("div", null, h("h2", { className: "panel-title" }, "Round Data"), h("p", { className: "panel-sub" }, "Full score record for the current game."))),
        h("div", { className: "panel-body" },
          rounds.length
            ? h(React.Fragment, null,
                h("div", { className: "table-wrap" },
                  h("table", null,
                    h("thead", null, h("tr", null, h("th", null, "Round"), players.map((player) => h("th", { key: player.name }, player.name)))),
                    h("tbody", null,
                      rounds.map((round, roundIndex) => h("tr", { key: roundIndex },
                        h("td", null, h("strong", null, roundIndex + 1)),
                        round.map((score, index) => h("td", { key: index }, score > 0 ? `+${score}` : score))
                      )),
                      h("tr", null, h("td", null, h("strong", null, "Total")), totals.map((score, index) => h("td", { key: index }, h("strong", null, score))))
                    )
                  )
                ),
                h("div", { className: "mobile-rounds" }, rounds.map((round, roundIndex) =>
                  h("article", { className: "round-card", key: roundIndex },
                    h("div", { className: "round-card-head" }, h("span", null, `Round ${roundIndex + 1}`), h("span", null, `${round.reduce((sum, score) => sum + score, 0)} pts`)),
                    round.map((score, index) => h("div", { className: "round-card-row", key: index }, h("span", null, players[index].name), h("strong", null, score > 0 ? `+${score}` : score)))
                  )
                ))
              )
            : h("div", { className: "empty-state" }, "No rounds yet. Add round one to begin.")
        )
      );
    }

    function WinnerScreen({ record, onNew, onHistory, onDownload }) {
      const champion = record.ranked[0];
      const totalWon = record.winnerAmount ?? winnerAmountFor(record);
      const payout = payoutDetails(record.ranked, record.payments || []);
      const rankClasses = ["rank-gold", "rank-silver", "rank-bronze", "rank-blue"];
      return h("section", { className: "winner-screen" },
        h("div", { className: "winner-card" },
          h("div", { className: "winner-content" },
            h("span", { className: "winner-sparkle one" }),
            h("span", { className: "winner-sparkle two" }),
            h("span", { className: "winner-sparkle three" }),
            h("span", { className: "pill green" }, "Tournament result"),
            h("h2", { className: "winner-title" }, "WINNER"),
            h("p", { className: "winner-sub" }, "A grand victory finish with the champion, final points, total amount won, and complete ranking order."),
            h("div", { className: "winner-center" },
              h("div", { className: "champion-panel" },
                h("div", { className: "trophy-badge", "aria-hidden": "true" }, "🏆"),
                h("div", null,
                  h("span", { className: "champion-label" }, "Champion"),
                  h("div", { className: "champion-name" }, record.winner),
                  h("div", { className: "champion-points" },
                    h("span", { className: "winner-stat-pill" }, `${champion.total} winning points`),
                    h("span", { className: "winner-stat-pill" }, `${record.rounds.length} rounds played`),
                    payout.winnerCount > 1 ? h("span", { className: "winner-stat-pill" }, `${money(payout.winnerShare)} each`) : null
                  )
                )
              ),
              h("div", { className: "amount-panel" },
                h("span", null, "Total Winning Amount"),
                h("div", { className: "winner-amount" }, money(totalWon))
              )
            ),
            h("div", { className: "winner-rankings" }, record.ranked.map((player, place) =>
              {
                const detail = payout.byIndex[player.index] || { place, pay: 0, receive: 0, tied: false };
                const placeLabel = `${places[detail.place]}${detail.tied ? " tie" : ""}`;
                return h("article", { className: `winner-rank ${rankClasses[detail.place] || "rank-blue"}`, key: player.name + player.index },
                h("div", { className: "winner-place" }, placeLabel),
                h("div", null,
                  h("strong", null, player.name),
                  h("span", null, detail.place === 0 ? `${player.total} points · Champion` : `${player.total} points · pays ${money(detail.pay)}`)
                ),
                h("div", { className: "winner-pay-total" }, detail.place === 0 ? money(detail.receive) : money(detail.pay))
              );
              }
            )),
            h("div", { style: { display: "flex", gap: "10px", flexWrap: "wrap", marginTop: "24px" } },
              h(Button, { className: "primary", onClick: onNew }, "New Game"),
              h(Button, { onClick: onHistory }, "Open Previous Games"),
              h(Button, { onClick: () => onDownload(record) }, "Download Results")
            )
          )
        )
      );
    }

    function HistoryScreen({ history, selectedHistory, setSelectedHistory, activeHistory, clearHistory, downloadScoreSheet, onNewGame }) {
      return h("section", { className: "history-screen" },
        h("aside", { className: "glass-panel" },
          h("div", { className: "panel-head" },
            h("div", null, h("h2", { className: "panel-title" }, "Previous Games"), h("p", { className: "panel-sub" }, "Each saved game opens as a full detail screen.")),
            h("div", { style: { display: "flex", gap: "8px", flexWrap: "wrap", justifyContent: "flex-end" } },
              h(Button, { className: "small primary", onClick: onNewGame }, "New Game"),
              h(Button, { className: "small danger", onClick: clearHistory }, "Clear")
            )
          ),
          h("div", { className: "panel-body history-list" },
            history.length
              ? history.map((game, index) => {
                  const totalWon = game.winnerAmount ?? winnerAmountFor(game);
                  return h("button", {
                    key: game.id || game.date,
                    type: "button",
                    className: `btn history-item ${selectedHistory === index ? "active" : ""}`,
                    onClick: () => setSelectedHistory(index)
                  }, h("strong", null, `${game.winner} · ${money(totalWon)}`), h("span", null, `${new Date(game.date).toLocaleString()} · ${game.rounds.length} rounds · target ${game.target}`));
                })
              : h("div", { className: "empty-state" }, "No previous games yet. Finish a game to save complete data.")
          )
        ),
        h("section", { className: "glass-panel" },
          activeHistory ? h(HistoryDetail, { game: activeHistory, downloadScoreSheet }) : h("div", { className: "panel-body" }, h("div", { className: "empty-state" }, "Select a game to view full details."))
        )
      );
    }

    function HistoryDetail({ game, downloadScoreSheet }) {
      const totalWon = game.winnerAmount ?? winnerAmountFor(game);
      const payout = payoutDetails(game.ranked, game.payments || []);
      return h(React.Fragment, null,
        h("div", { className: "panel-head" },
          h("div", null, h("h2", { className: "panel-title" }, `${game.winner} won ${money(totalWon)}`), h("p", { className: "panel-sub" }, "Complete ranking, payment, amount won, and round data.")),
          h(Button, { className: "small", onClick: () => downloadScoreSheet(game) }, "Download")
        ),
        h("div", { className: "panel-body" },
          h("div", { className: "detail-grid" },
            h("div", { className: "detail-stat" }, h("strong", null, game.players.length), h("span", null, "Players")),
            h("div", { className: "detail-stat" }, h("strong", null, game.target), h("span", null, "Target")),
            h("div", { className: "detail-stat" }, h("strong", null, game.rounds.length), h("span", null, "Rounds")),
            h("div", { className: "detail-stat" }, h("strong", null, money(totalWon)), h("span", null, "Amount won"))
          ),
          h("div", { className: "standings-list", style: { marginBottom: "16px" } }, game.ranked.map((player, place) =>
            {
              const detail = payout.byIndex[player.index] || { place, pay: 0, receive: 0, tied: false };
              return h("article", { className: `standing-card ${detail.place === 0 ? "leader" : ""}`, key: player.name + player.index },
                h("div", { className: "place" }, `${places[detail.place]}${detail.tied ? " tie" : ""}`),
                h(Avatar, { player, index: player.index }),
                h("div", { className: "standing-name" }, player.name, h("span", null, detail.place === 0 ? `${money(detail.receive)} won` : `${money(detail.pay)} payment`)),
                h("div", { className: "standing-points" }, player.total)
              );
            }
          )),
          h("div", { className: "table-wrap" },
            h("table", null,
              h("thead", null, h("tr", null, h("th", null, "Round"), game.players.map((player) => h("th", { key: player.name }, player.name)))),
              h("tbody", null,
                game.rounds.map((round, roundIndex) => h("tr", { key: roundIndex },
                  h("td", null, h("strong", null, roundIndex + 1)),
                  round.map((score, index) => h("td", { key: index }, score > 0 ? `+${score}` : score))
                )),
                h("tr", null, h("td", null, h("strong", null, "Total")), game.totals.map((score, index) => h("td", { key: index }, h("strong", null, score))))
              )
            )
          ),
          h("div", { className: "mobile-rounds" }, game.rounds.map((round, roundIndex) =>
            h("article", { className: "round-card", key: roundIndex },
              h("div", { className: "round-card-head" }, h("span", null, `Round ${roundIndex + 1}`), h("span", null, `${round.reduce((sum, score) => sum + score, 0)} pts`)),
              round.map((score, index) =>
                h("div", { className: "round-card-row", key: index },
                  h("span", null, game.players[index].name),
                  h("strong", null, score > 0 ? `+${score}` : score)
                )
              )
            )
          ))
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
